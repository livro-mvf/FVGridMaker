<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" role="img" aria-labelledby="title desc">
  <title id="title">FVGridMaker</title>
  <desc id="desc">Logo com uma malha estruturada e três circunferências pequenas no centro de células.</desc>

  <defs>
    <style>
      .text {
        fill: #2c4774;
        font-family: Arial, Helvetica, sans-serif;
        font-weight: 700;
      }

      .subtext {
        fill: #666666;
        font-family: Arial, Helvetica, sans-serif;
        font-weight: 400;
      }

      .grid {
        stroke: #3f5f96;
        stroke-width: 4;
        stroke-linecap: round;
        opacity: 0.85;
      }

      .cell-point-a { fill: #2f7d62; }
      .cell-point-b { fill: #c84630; }
      .cell-point-c { fill: #d48a2c; }
    </style>
  </defs>

  <g transform="translate(28,28)">
    <path class="grid" d="M0 0 H120 M0 40 H120 M0 80 H120 M0 120 H120" />
    <path class="grid" d="M0 0 V120 M40 0 V120 M80 0 V120 M120 0 V120" />

    <circle class="cell-point-a" cx="20" cy="20" r="6" />
    <circle class="cell-point-b" cx="60" cy="60" r="6" />
    <circle class="cell-point-c" cx="100" cy="20" r="6" />
  </g>

  <text class="text" x="185" y="72" font-size="42">FVGridMaker</text>
  <text class="subtext" x="188" y="108" font-size="18">structured grids for finite volumes</text>
</svg>